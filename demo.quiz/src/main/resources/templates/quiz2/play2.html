<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>「○×クイズ」アプリ：PLAY</title>
</head>

<body>

    <h1>「○×クイズ」アプリ：PLAY</h1>

    <h3>クイズ</h3>

    <th:block th:if="${msg}">

        <p th:text="${msg}" style="color:red"></p>

        <a th:href="@{/quiz2/crud2}">CRUD画面へ</a>

    </th:block>

    <th:block th:unless="${msg}">

        <p th:text="${quiz2Form.question}">
            クイズ内容
        </p>

        <form th:action="@{/quiz2/check2}"
              th:object="${quiz2Form}"
              method="POST">

            <input type="hidden" th:field="*{id}">

            <button name="answer" value="true">○</button>

            <button name="answer" value="false">×</button>

        </form>

    </th:block>

</body>

</html>
